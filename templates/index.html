<!DOCTYPE html>
<html>
<head>
    <title>Punch Data Update</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 100px;
        }
        button {
            padding: 15px 30px;
            font-size: 18px;
            background: green;
            color: white;
            border: none;
            cursor: pointer;
        }
        #output {
            margin-top: 30px;
            text-align: left;
            width: 70%;
            margin-left: auto;
            margin-right: auto;
            background: #f4f4f4;
            padding: 10px;
            height: 300px;
            overflow-y: scroll;
        }
    </style>
</head>
<body>

<h2>Update Punch Data</h2>

<button onclick="runScript()">Run Update</button>

<div id="output"></div>

<script>
function runScript() {
    const output = document.getElementById("output");
    output.innerHTML = "";

    const eventSource = new EventSource("/run-script");

    eventSource.onmessage = function(event) {
        output.innerHTML += event.data + "<br>";
        output.scrollTop = output.scrollHeight;
    };

    eventSource.onerror = function() {
        eventSource.close();
    };
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Punch Data Update</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 80px;
            background-color: #f9f9f9;
        }

        h2 {
            color: #333;
        }

        button {
            padding: 15px 30px;
            font-size: 18px;
            background: green;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

        button:disabled {
            background: grey;
            cursor: not-allowed;
        }

        #status {
            margin-top: 15px;
            font-weight: bold;
        }

        #output {
            margin-top: 30px;
            text-align: left;
            width: 70%;
            margin-left: auto;
            margin-right: auto;
            background: #ffffff;
            border: 1px solid #ddd;
            padding: 15px;
            height: 350px;
            overflow-y: scroll;
            border-radius: 5px;
            font-family: monospace;
            font-size: 14px;
        }
    </style>
</head>

<body>

<h2>Update Punch Data</h2>

<button id="runBtn" onclick="runScript()">Run Update</button>

<div id="status"></div>

<div id="output"></div>

<script>
function runScript() {

    const output = document.getElementById("output");
    const status = document.getElementById("status");
    const button = document.getElementById("runBtn");

    output.innerHTML = "";
    status.innerHTML = "⏳ Running...";
    button.disabled = true;

    const eventSource = new EventSource("/run-script");

    eventSource.onmessage = function(event) {
        output.innerHTML += event.data + "<br>";
        output.scrollTop = output.scrollHeight;

        // Detect completion message
        if (event.data.includes("DONE") || event.data.includes("completed")) {
            status.innerHTML = "✅ Completed";
            button.disabled = false;
            eventSource.close();
        }
    };

    eventSource.onerror = function() {
        status.innerHTML = "❌ Error occurred";
        button.disabled = false;
        eventSource.close();
    };
}
</script>

</body>
</html>
